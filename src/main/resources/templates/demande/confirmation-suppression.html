<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmer la suppression</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container" style="max-width: 720px; padding-top: 40px;">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-danger text-white">
            Confirmer la suppression
        </div>
        <div class="card-body">
            <p class="mb-2">Vous êtes sur le point de supprimer la demande <strong th:text="'#' + ${demande.id}"></strong>.</p>
            <p class="text-danger mb-0"><strong>Cette action est irréversible.</strong></p>
        </div>
        <div class="card-footer d-flex justify-content-end gap-2">
            <a th:href="@{/demandes}" class="btn btn-secondary">Annuler</a>
            <form th:action="'/demandes/' + ${demande.id} + '/supprimer'" method="post" class="m-0">
                <button type="submit" class="btn btn-danger">Supprimer</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
