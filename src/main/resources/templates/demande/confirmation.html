<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation de Demande</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .badge-cree {
            background-color: #FFC107;
            color: black;
            font-weight: bold;
        }
        .badge-ok {
            color: green;
            font-weight: bold;
        }
        .badge-nok {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1 class="mb-4">Demande enregistrée avec succès</h1>

    <!-- Message flash -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h2>Récapitulatif de la demande</h2>
        </div>
        <div class="card-body">
            <table class="table">
                <tbody>
                    <tr>
                        <th>Numéro de demande</th>
                        <td th:text="${demande.id}"></td>
                    </tr>
                    <tr>
                        <th>Date de demande</th>
                        <td th:text="${#temporals.format(demande.dateDemande, 'dd/MM/yyyy HH:mm')}"></td>
                    </tr>
                    <tr>
                        <th>Demandeur</th>
                        <td th:text="${demande.nomDemandeur + ' ' + demande.prenomDemandeur}"></td>
                    </tr>
                    <tr>
                        <th>Passeport</th>
                        <td th:text="${demande.numeroPasSeport}"></td>
                    </tr>
                    <tr>
                        <th>Référence Visa</th>
                        <td th:text="${demande.referenceVisa}"></td>
                    </tr>
                    <tr>
                        <th>Type de Visa</th>
                        <td th:text="${demande.typeVisa}"></td>
                    </tr>
                    <tr>
                        <th>Type de Demande</th>
                        <td th:text="${demande.typeDemande}"></td>
                    </tr>
                    <tr>
                        <th>Statut</th>
                        <td>
                            <span class="badge badge-cree" th:text="${demande.statutDemande}"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card mt-4">
        <div class="card-header bg-info text-white">
            <h3>Pièces associées</h3>
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead class="table-light">
                    <tr>
                        <th>Pièce</th>
                        <th>Obligatoire</th>
                        <th>Fournie</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="piece : ${demande.pieces}">
                        <td th:text="${piece.nomPiece}"></td>
                        <td th:text="${piece.obligatoire ? 'Oui' : 'Non'}"></td>
                        <td>
                            <span th:if="${piece.fourni}" class="badge-ok">✔ Fournie</span>
                            <span th:unless="${piece.fourni}" class="badge-nok">✗ Non fournie</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 text-center">
        <a th:href="@{/}" class="btn btn-primary">Retour à l'accueil</a>
        <a th:href="@{/demandes/nouvelle}" class="btn btn-secondary">Créer une nouvelle demande</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
